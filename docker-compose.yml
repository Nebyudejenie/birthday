# ─────────────────────────────────────────────────────────────
#  Ebony's Birthday — production stack
#  cloudflared (tunnel) → nginx (headers/gzip/cache) → web (Next.js)
#  Nothing binds a public host port: Cloudflare Tunnel is the only ingress.
#  Local testing: add -f docker-compose.local.yml to publish nginx on :8080.
# ─────────────────────────────────────────────────────────────
name: ebony

services:
  # ── The Next.js standalone server ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-ebony-birthday}:${TAG:-latest}
    container_name: ebony-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-UTC}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - ebony

  # ── Nginx edge inside the box: security headers, gzip, caching ──
  nginx:
    image: nginx:1.27-alpine
    container_name: ebony-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    environment:
      - TZ=${TZ:-UTC}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ebony

  # ── Cloudflare Tunnel — the public ingress (HTTPS at CF edge) ──
  # Enabled only with:  docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ebony-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      nginx:
        condition: service_started
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - ebony

networks:
  ebony:
    driver: bridge
