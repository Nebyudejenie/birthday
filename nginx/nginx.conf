# ─────────────────────────────────────────────────────────────
#  Ebony's Birthday — nginx edge (included inside http{} as conf.d/default.conf)
#  Sits behind Cloudflare Tunnel; talks plain HTTP to cloudflared internally.
#  HTTPS is terminated at the Cloudflare edge.
# ─────────────────────────────────────────────────────────────

# hide nginx version
server_tokens off;

# real client IP comes from Cloudflare Tunnel (only cloudflared reaches us)
set_real_ip_from 0.0.0.0/0;
real_ip_header CF-Connecting-IP;

# ── Compression (Brotli is added at the Cloudflare edge) ──
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
  text/plain text/css text/xml
  application/javascript application/json application/xml
  application/manifest+json image/svg+xml font/ttf font/otf;

# ── Cache-Control by content type (Next serves hashed, immutable assets) ──
map $sent_http_content_type $cache_control {
  default                        "public, max-age=0, must-revalidate";
  ~*text/html                    "no-cache";
  ~*application/manifest\+json   "no-cache";
  ~*application/javascript       "public, max-age=31536000, immutable";
  ~*text/css                     "public, max-age=31536000, immutable";
  ~*^font/                       "public, max-age=31536000, immutable";
  ~*image/                       "public, max-age=2592000";
}

upstream ebony_web {
  server web:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 4m;

  # ── Security headers (applied to every response via server scope) ──
  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), autoplay=(self)" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  # CSP — allow the app's own assets, inline styles/hydration scripts that Next
  # emits, data: images/fonts, and the birthday song streamed from GitHub.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' https://raw.githubusercontent.com; connect-src 'self' https://raw.githubusercontent.com; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;
  add_header Cache-Control $cache_control always;

  # ── Liveness for the nginx layer itself ──
  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # ── App readiness (proxied to the Next server) ──
  location = /api/health {
    proxy_pass http://ebony_web;
    proxy_set_header Host $host;
    access_log off;
  }

  # ── Immutable Next static assets ──
  location /_next/static/ {
    proxy_pass http://ebony_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    # let nginx's map be the single source of Cache-Control
    proxy_hide_header Cache-Control;
  }

  # ── Everything else ──
  location / {
    proxy_pass http://ebony_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_cache_bypass $http_upgrade;
    # drop Next's upstream Cache-Control so nginx's map value is authoritative
    # (prevents the edge caching HTML for a year)
    proxy_hide_header Cache-Control;
  }
}
