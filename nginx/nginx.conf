# Reverse proxy for the Ebony birthday experience.
# HTTP is ready out of the box. Uncomment the HTTPS server block once your
# certificates are mounted at /etc/nginx/certs (fullchain.pem + privkey.pem).

upstream ebony_web {
    server web:3000;
    keepalive 32;
}

# ── Security & compression, shared by all servers ──
map $sent_http_content_type $cacheable {
    default                    "no-cache";
    ~*text/css                 "public, max-age=31536000, immutable";
    ~*application/javascript   "public, max-age=31536000, immutable";
    ~*image/                   "public, max-age=2592000";
    ~*font/                    "public, max-age=31536000, immutable";
}

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

server {
    listen 80;
    server_name _;

    # ↓ Once HTTPS is set up, force redirect instead of serving over HTTP:
    # return 301 https://$host$request_uri;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass http://ebony_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://ebony_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control $cacheable;
    }
}

